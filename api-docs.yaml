components:
  schemas:
    Create:
      required:
      - accountNonLocked
      - password
      - username
      type: object
      properties:
        username:
          maxLength: 20
          minLength: 3
          type: string
        password:
          maxLength: 40
          minLength: 6
          type: string
        adminLevel:
          type: integer
          format: int32
        accountNonLocked:
          type: boolean
    UpdateUserRequest:
      required:
      - userDto
      type: object
      properties:
        updatePassword:
          type: boolean
        userDto:
          $ref: '#/components/schemas/Create'
    Request:
      type: object
      properties:
        enable:
          type: boolean
        sdaPin:
          $ref: '#/components/schemas/Select'
        sclPin:
          $ref: '#/components/schemas/Select'
    Select:
      required:
      - boardId
      - nr
      type: object
      properties:
        nr:
          type: integer
          format: int32
        boardId:
          type: integer
          format: int64
    Detailed:
      type: object
      properties:
        enable:
          type: boolean
        filter:
          $ref: '#/components/schemas/Filter'
    Filter:
      required:
      - fabricable
      type: object
      properties:
        fabricable:
          type: string
    PumpAdvice:
      required:
      - type
      type: object
      properties:
        type:
          type: string
          enum:
          - RUN
          - PUMP_UP
          - PUMP_DOWN
          - PUMP_ML
          - PUMP_TIME
          - PUMP_STEPS
        amount:
          minimum: 1
          type: integer
          format: int64
    ImportConfirmRequest:
      type: object
      properties:
        importAllRecipes:
          type: boolean
        importRecipeIds:
          type: array
          items:
            type: integer
            format: int64
        importAllCollections:
          type: boolean
        importCollectionIds:
          type: array
          items:
            type: integer
            format: int64
        importAllGlasses:
          type: boolean
        importAllCategories:
          type: boolean
        duplicateMode:
          type: string
          enum:
          - overwrite
          - skip
          - keep_both
    ExportRequest:
      type: object
      properties:
        exportAllRecipes:
          type: boolean
        exportRecipeIds:
          type: array
          items:
            type: integer
            format: int64
        exportAllCollections:
          type: boolean
        exportCollectionIds:
          type: array
          items:
            type: integer
            format: int64
    LoginRequest:
      required:
      - password
      - username
      type: object
      properties:
        username:
          type: string
        password:
          type: string
        remember:
          type: boolean
