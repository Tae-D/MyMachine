<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komunikace s AI</title>
</head>
<body>
    
<form id="promptform">
    <label for="prompt">Napiš text pro AI</label>
    <input type="text" id="prompt" required> 
    <br>
    <input type="submit" value="Odeslat">
</form>

<div id="response"></div>

<script>
    const form = document.getElementById('promptform');
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const promptValue = document.getElementById('prompt').value;

        try {
            // "http://localhost:5000/process" je adresa vašeho Python serveru
            const response = await fetch('http://localhost:5000/process', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text: promptValue })
            });

            const data = await response.json();
            document.getElementById('response').innerHTML = 
            "Odpověď: " + data.humanResponse + "<br>" + 
            "Nápoj : " + data.reply;
        } catch (error) {
            console.error('Chyba:', error);
        }
    });
</script>

</body>
</html>
