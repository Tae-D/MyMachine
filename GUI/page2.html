<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Komunikace s AI</title>
    <link rel="stylesheet" href="page2.css" />
    <script defer src="form.js"></script>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
  </head>
  <body>
    <form id="promptform" action="#">
      <fieldset>
        <input
          type="text"
          placeholder="Napiš zadání pro AI"
          id="prompt"
          required
        />
        <button class="button" type="submit">Odeslat</button>
      </fieldset>
    </form>
    <br>
    <div id="response"></div>
    <div class="buttons">
      <button style="top: 0;">Připravit</button><br>
      <button style="bottom: 0;" onclick="history.back()">Začít znovu</button>
    </div>
    <div style="visibility: hidden" class="loading"></div>
    <footer>       
      <img style="height: 2vw; margin-right: 5vw;" src="krenka.png" alt="Logo gymnázia Křenová">
      Vyrobeno v rámci projektu MyMachine
      <img style="height: 5vw; margin-left: 5vw;" src="kuldovka.jpg" alt="Logo základní školy Kuldovka"></footer>
  </body>
</html>
